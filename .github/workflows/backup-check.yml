name: DB Backup Export

# Free-tier replacement for the Supabase backups API check (which returns 403:
# the backups endpoint needs a Pro plan + an org-scoped PAT we don't have).
# Instead we take our own backup: export every public table to gzipped JSON
# via the service-role REST API and keep it as a workflow artifact (90 days).

on:
  schedule:
    # Daily at 06:15 UTC
    - cron: '15 6 * * *'
  workflow_dispatch:

# Opt in to Node.js 24 for GitHub Actions runners (forced on 2026-06-16)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  export-backup:
    name: Export all tables to artifact
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Export tables
        run: python scripts/export-backup.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OUT_DIR: backup-out

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_id }}
          path: backup-out/
          retention-days: 90
          if-no-files-found: error
